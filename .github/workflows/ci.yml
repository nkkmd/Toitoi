name: CI

on:
  push:
  pull_request:

env:
  # Opt into Node.js 24 runtime for JavaScript-based GitHub Actions ahead of the default switch (June 2nd, 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-node's built-in pnpm cache needs `pnpm` available on PATH.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
