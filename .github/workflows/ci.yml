name: CI

on:
  push:
  pull_request:

env:
  # Opt into Node.js 24 runtime for JavaScript-based GitHub Actions ahead of the default switch (June 2nd, 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # pnpm@11 requires Node >= 22.13
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@11.3.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate v0.8.0 protocol vocabulary
        run: node packages/protocol/test_vocabulary.js

      - name: Validate v0.8.0 FTS5 projection mapping
        run: node apps/api/test_fts5_search_projection.js projection

      - name: Validate v0.8.0 FTS5 primary search
        run: node apps/api/test_fts5_search_projection.js search-primary

      - name: Validate v0.8.0 FTS5 summary search
        run: node apps/api/test_fts5_search_projection.js search-summary

      - name: Validate v0.8.0 FTS5 filters and facets
        run: node apps/api/test_fts5_search_projection.js filters

      - name: Validate v0.8.0 FTS5 upsert
        run: node apps/api/test_fts5_search_projection.js upsert

      - name: Validate v0.8.0 search classification
        run: node apps/api/test_search_result_classifier.js

      - name: Validate v0.8.0 search HTTP API
        run: node apps/api/test_v0_8_0_search_api.js

      - name: Validate v0.8.0 reference ranking
        run: node apps/api/test_v0_8_0_search_reference_dataset.js

      - name: Validate v0.8.0 vocabulary HTTP API
        run: node apps/api/test_vocabulary_http_service.js

      - name: Validate v0.8.0 related inquiry API
        run: node apps/api/test_related_inquiry_api.js

      - name: Validate v0.8.0 replay equivalence
        run: node apps/api/test_search_replay_equivalence.js

      - name: Validate v0.8.0 frontend view model
        run: node apps/frontend/test_search_exploration_view_model.js

      - name: Validate v0.8.0 frontend renderer
        run: node apps/frontend/test_search_exploration_renderer.js

      - name: Run tests
        run: corepack pnpm test